[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/framework", "src/courts", "src/templates", "src/validation"]

[project]
name = "judgemind-scraper-framework"
version = "0.1.0"
description = "Court data scraping framework for Judgemind"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "httpx>=0.27",
    "playwright>=1.42",
    "beautifulsoup4>=4.12",
    "lxml>=5.1",
    "pdfplumber>=0.11",
    "redis>=5.0",
    "boto3>=1.34",
    "pydantic>=2.6",
    "structlog>=24.1",
    "apscheduler>=3.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "respx>=0.21",       # httpx mocking
    "moto[s3]>=5.0",     # AWS mocking
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN"]
ignore = ["ANN401"]  # ANN401 conflicts with **kwargs: Any, which is the correct annotation

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "regression: scraper regression tests against archived fixtures",
]
