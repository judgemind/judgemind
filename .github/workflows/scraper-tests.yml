name: Scraper Regression Tests

on:
  schedule:
    - cron: '0 6 * * *' # 6 AM UTC daily (10 PM Pacific)
  workflow_dispatch: # manual trigger

jobs:
  scraper-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/scraper-framework
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run regression tests against archived fixtures
        run: pytest tests/ -n auto -v --tb=long -m regression
      - name: Post results to tracking issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'scraper-health',
              state: 'open'
            });
            const trackingIssue = issues.data[0];
            if (trackingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: trackingIssue.number,
                body: `⚠️ Scraper regression tests failed on ${new Date().toISOString().split('T')[0]}. [Run details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }
