name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      scraper: ${{ steps.changes.outputs.scraper }}
      nlp: ${{ steps.changes.outputs.nlp }}
      api: ${{ steps.changes.outputs.api }}
      web: ${{ steps.changes.outputs.web }}
      infra: ${{ steps.changes.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            scraper:
              - 'packages/scraper-framework/**'
            nlp:
              - 'packages/nlp-pipeline/**'
            api:
              - 'packages/api/**'
            web:
              - 'packages/web/**'
            infra:
              - 'infra/**'

  scraper-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/scraper-framework
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Test
        run: pytest tests/ -n auto -v --tb=short

  nlp-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.nlp == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/nlp-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Test
        run: pytest tests/ -v --tb=short

  api-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: judgemind
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: judgemind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://judgemind:localdev@localhost:5432/judgemind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test

  web-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  infra-validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Terraform validate
        run: |
          terraform init -backend=false
          terraform validate

  # Always runs. Reports success only when every applicable job passed or was
  # skipped (path filter did not match). Branch protection requires this check.
  ci-passed:
    needs: [scraper-tests, nlp-tests, api-tests, web-tests, infra-validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"
          if echo "$results" | grep -q '"result": "failure"'; then
            echo "One or more jobs failed."
            exit 1
          fi
          echo "All jobs passed or were skipped."
