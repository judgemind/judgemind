name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

jobs:
  terraform:
    name: Validate and Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-west-2
      TF_IN_AUTOMATION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      # Format check runs across all Terraform code without credentials.
      - name: Terraform Format Check
        run: terraform fmt -check -recursive infra/terraform/

      # Validate each environment. Uses -backend=false so no AWS credentials
      # are required for syntax and config validation.
      - name: Validate dev
        run: |
          terraform -chdir=infra/terraform/environments/dev init -backend=false
          terraform -chdir=infra/terraform/environments/dev validate

      - name: Validate production
        run: |
          terraform -chdir=infra/terraform/environments/production init -backend=false
          terraform -chdir=infra/terraform/environments/production validate

      # Plan requires AWS credentials (stored as GitHub Actions secrets).
      # The plan confirms the module is deployable and shows exactly what
      # resources will be created or modified.
      #
      # To enable: add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to the
      # repository's Actions secrets (Settings → Secrets and variables → Actions).
      - name: Terraform Init (dev)
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: terraform -chdir=infra/terraform/environments/dev init

      - name: Terraform Plan (dev)
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: terraform -chdir=infra/terraform/environments/dev plan -no-color -input=false
